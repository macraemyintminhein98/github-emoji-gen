<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Emoji Generator</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f6f8fa; color: #24292e; }
        .container { max-width: 900px; margin: auto; background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #0366d6; }
        input[type="text"] { width: calc(100% - 22px); padding: 10px; margin-bottom: 15px; border: 1px solid #d1d5da; border-radius: 6px; font-size: 16px; }
        .filters button { background-color: #f3f4f6; border: 1px solid #d1d5da; border-radius: 6px; padding: 8px 12px; margin-right: 8px; margin-bottom: 8px; cursor: pointer; }
        .filters button.active { background-color: #0366d6; color: #fff; }
        .emoji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; }
        .emoji-item { background-color: #f6f8fa; padding: 10px; border-radius: 6px; text-align: center; cursor: pointer; border: 1px solid #e1e4e8; transition: transform 0.1s ease; }
        .emoji-item:hover { transform: translateY(-2px); }
        .emoji-item span { display: block; font-size: 2em; margin-bottom: 5px; }
        .emoji-item small { font-size: 0.8em; color: #586069; word-break: break-all; }
        .st-btn { display: block; text-align: center; margin-top: 30px; }
        .stripe-button-el span { background-image: none !important; box-shadow: none !important; font-size: 16px !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Emoji Generator</h1>
        <p>Quickly find and copy GitHub-compatible emoji shortcuts.</p>
        <input type="text" id="searchInput" placeholder="Search emojis..." onkeyup="filterEmojis()">

        <div class="filters" id="filterButtons"></div>

        <div class="emoji-grid" id="emojiContainer"></div>

        <p style="text-align: center; margin-top: 20px;"><strong>Liked it? Get lifetime access!</strong></p>
        <form action="/checkout" method="POST" class="st-btn">
            <button type="submit" style="background-color: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px;">
                Buy for ${{price}} (One-time purchase)
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/emoji-datasource-github@5.0.1/emoji.json"></script>
    <script>
        const emojis = window.emoji; // Loaded from CDN
        const emojiContainer = document.getElementById('emojiContainer');
        const searchInput = document.getElementById('searchInput');
        const filterButtonsContainer = document.getElementById('filterButtons');
        let currentCategory = 'All';

        function generateCategories() {
            const categories = new Set(['All']);
            emojis.forEach(emoji => { if (emoji.category) categories.add(emoji.category); });
            categories.forEach(category => {
                const button = document.createElement('button');
                button.textContent = category;
                button.onclick = () => filterByCategory(category);
                filterButtonsContainer.appendChild(button);
            });
            filterByCategory('All'); // Initial load
        }

        function displayEmojis(filteredEmojis) {
            emojiContainer.innerHTML = '';
            filteredEmojis.forEach(emoji => {
                const item = document.createElement('div');
                item.className = 'emoji-item';
                item.innerHTML = `<span>${emoji.native}</span><small>:${emoji.short_codes[0]}:</small>`;
                item.onclick = () => copyToClipboard(`:${emoji.short_codes[0]}:`);
                emojiContainer.appendChild(item);
            });
        }

        function filterEmojis() {
            const searchTerm = searchInput.value.toLowerCase();
            let filtered = emojis;
            if (currentCategory !== 'All') {
                filtered = filtered.filter(e => e.category === currentCategory);
            }
            if (searchTerm) {
                filtered = filtered.filter(e => 
                    e.name.toLowerCase().includes(searchTerm) || 
                    e.short_codes.some(code => code.toLowerCase().includes(searchTerm))
                );
            }
            displayEmojis(filtered);
        }

        function filterByCategory(category) {
            currentCategory = category;
            Array.from(filterButtonsContainer.children).forEach(btn => {
                btn.classList.toggle('active', btn.textContent === category);
            });
            filterEmojis();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert(`Copied to clipboard: ${text}`);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        window.onload = generateCategories;
    </script>
</body>
</html>
